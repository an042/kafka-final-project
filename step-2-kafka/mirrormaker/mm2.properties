# mm2.properties — конфигурация MirrorMaker 2
#
# MirrorMaker 2 (MM2) — инструмент репликации между Kafka кластерами.
# Запускается как Kafka Connect worker со встроенными коннекторами.
# Входит в состав Kafka с версии 2.4, не требует отдельной установки.
#
# Что делает в нашем проекте:
#   Читает топики products-raw, products-filtered, client-events из кластера 1
#   Пишет их в кластер 2 с префиксом "cluster1."
#   Результат: cluster1.products-raw, cluster1.products-filtered, cluster1.client-events
#
# Как работает:
#   MM2 создаёт MirrorSourceConnector — читатель из кластера 1
#   и MirrorSinkConnector — писатель в кластер 2.
#   Оффсеты синхронизируются через MirrorCheckpointConnector.
#   При рестарте MM2 продолжает с того места, где остановился.

# ─── Кластеры ─────────────────────────────────────────────────────────────────
# Имена кластеров — произвольные алиасы, используются как префикс в топиках кластера 2
# cluster1.products-raw — это топик "products-raw" из кластера с именем "cluster1"
clusters = cluster1, cluster2

# Bootstrap серверы для каждого кластера (через алиас из строки clusters)
# Все три брокера кластера 1 — для отказоустойчивости
cluster1.bootstrap.servers = kafka-1:9092,kafka-2:9092,kafka-3:9092
# Единственный брокер кластера 2
cluster2.bootstrap.servers = kafka-analytics:9092

# ─── Что реплицируем ──────────────────────────────────────────────────────────
# Направление репликации: из cluster1 в cluster2
cluster1->cluster2.enabled = true

# Отключаем обратную репликацию cluster2→cluster1 (нам не нужна)
# По умолчанию MM2 включает все направления при указании двух кластеров
cluster2->cluster1.enabled = false

# Регулярное выражение топиков для репликации
# .* — все топики; мы ограничиваем явным списком через exclude ниже
# Или задаём явно: products-raw|products-filtered|client-events
cluster1->cluster2.topics = products-raw,products-filtered,client-events

# Не реплицировать внутренние топики MM2 обратно (предотвращает петлю)
cluster1->cluster2.topics.blacklist = .*[\-\.]internal, .*\.replica, __.*

# ─── Аутентификация в кластере 1 (SASL_SSL) ───────────────────────────────────
# Все параметры с префиксом cluster1. применяются только к соединениям с cluster1

# SASL_SSL — шифрование (SSL) + аутентификация (SASL)
cluster1.security.protocol = SASL_SSL

# SCRAM-SHA-512 — безопасный механизм аутентификации (пароль хешируется)
cluster1.sasl.mechanism = SCRAM-SHA-512

# JAAS config: имя пользователя + пароль для mirrormaker
# Пользователь mirrormaker создан в cluster-1/docker-compose.yml (KAFKA_CLIENT_USERS)
# ACL для чтения всех топиков настроен в setup.sh
cluster1.sasl.jaas.config = org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="mirrormaker" \
  password="MirrorPass1";

# Путь к truststore внутри контейнера MirrorMaker (монтируется в docker-compose.yml)
cluster1.ssl.truststore.location = /etc/kafka/certs/kafka.truststore.pem
# PEM — текстовый формат, не требует пароля
cluster1.ssl.truststore.type = PEM

# ─── Аутентификация в кластере 2 (SASL_SSL) ───────────────────────────────────
# mirrormaker — суперпользователь в кластере 2 (KAFKA_CFG_SUPER_USERS)
# поэтому не нужны отдельные ACL на запись

cluster2.security.protocol = SASL_SSL
cluster2.sasl.mechanism = SCRAM-SHA-512

# Тот же пользователь mirrormaker, тот же пароль — упрощает управление
cluster2.sasl.jaas.config = org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="mirrormaker" \
  password="MirrorPass1";

cluster2.ssl.truststore.location = /etc/kafka/certs/kafka.truststore.pem
cluster2.ssl.truststore.type = PEM

# ─── Настройки репликации ─────────────────────────────────────────────────────
# Intervал синхронизации оффсетов (мс)
offset-syncs.topic.replication.factor = 1

# Replication factor для служебных топиков MM2
# 1 — кластер 2 имеет только один брокер; эти настройки применяются ко всем внутренним топикам
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
replication.factor = 1

# Connect-worker хранит своё состояние в трёх служебных топиках.
# По умолчанию RF=-1 (используется default.replication.factor кластера = 3).
# Cluster2 имеет 1 брокер — нужно явно задать RF=1, иначе TimeoutException при старте.
offset.storage.replication.factor = 1
# Конфигурации коннекторов (какие топики реплицировать, параметры)
config.storage.replication.factor = 1
# Статус задач и коннекторов (RUNNING, FAILED, PAUSED)
status.storage.replication.factor = 1

# Обновлять конфигурацию топиков кластера 2 при изменении в кластере 1
# (retention, partitions count и т.д.)
sync.topic.configs.enabled = true

# Число потоков репликации — больше = выше пропускная способность
# 4 — достаточно для учебного проекта (по числу партиций в топиках)
tasks.max = 4
