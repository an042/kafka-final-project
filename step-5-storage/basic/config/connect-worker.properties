# connect-worker.properties — конфигурация воркера Kafka Connect.
#
# Воркер управляет подключением к Kafka, сериализацией данных и жизненным
# циклом коннекторов. Отдельный конфиг на каждый инстанс воркера.

# ── Подключение к Kafka ───────────────────────────────────────────────────────

# Адреса брокеров кластера 1 (все три для надёжности)
bootstrap.servers=kafka-1:9092,kafka-2:9092,kafka-3:9092

# ── SASL/TLS аутентификация ────────────────────────────────────────────────────

# SASL_SSL: шифрование (SSL) + аутентификация (SASL)
security.protocol=SASL_SSL

# Механизм аутентификации: SCRAM-SHA-512 (задан в docker-compose.yml кластера 1)
sasl.mechanism=SCRAM-SHA-512

# JAAS конфиг: логин и пароль пользователя kafka-connect
# Пользователь создан в cluster-1/docker-compose.yml (KAFKA_CLIENT_USERS)
sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="kafka-connect" \
  password="ConnectPass1";

# CA сертификат для проверки TLS сертификата брокеров
# Смонтирован в docker-compose.yml: ./ssl/certs/ca.crt
ssl.truststore.location=/opt/bitnami/kafka/config/certs/ca.crt

# PEM формат (не JKS — bitnami использует PEM для CA)
ssl.truststore.type=PEM

# ── Consumer-specific SASL/TLS (для чтения топика) ────────────────────────────

# Те же настройки нужны для consumer части воркера
consumer.security.protocol=SASL_SSL
consumer.sasl.mechanism=SCRAM-SHA-512
consumer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="kafka-connect" \
  password="ConnectPass1";
consumer.ssl.truststore.location=/opt/bitnami/kafka/config/certs/ca.crt
consumer.ssl.truststore.type=PEM

# Producer-specific (для внутренних топиков Connect)
producer.security.protocol=SASL_SSL
producer.sasl.mechanism=SCRAM-SHA-512
producer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="kafka-connect" \
  password="ConnectPass1";
producer.ssl.truststore.location=/opt/bitnami/kafka/config/certs/ca.crt
producer.ssl.truststore.type=PEM

# ── Сериализация ───────────────────────────────────────────────────────────────

# key.converter — как десериализовать ключ сообщения
# StringConverter — ключ как UTF-8 строка (product_id)
key.converter=org.apache.kafka.connect.storage.StringConverter

# value.converter — как десериализовать значение
# JsonConverter — JSON объект (без обёртки schema, как пишет shop-api)
value.converter=org.apache.kafka.connect.json.JsonConverter

# schemas.enable=false — shop-api пишет чистый JSON без Schema Registry envelope
# Если бы было true — Connect ожидал бы {"schema": {...}, "payload": {...}}
value.converter.schemas.enable=false
key.converter.schemas.enable=false

# ── Внутренние топики Connect ─────────────────────────────────────────────────

# Kafka Connect хранит состояние в трёх внутренних топиках.
# В standalone режиме эти настройки используются для consumer offsets.

# Топик для хранения оффсетов (какой сдвиг последний раз прочитали)
# При standalone режиме — локальный файл (не Kafka топик)
offset.storage.file.filename=/tmp/connect-offsets.dat

# Интервал сброса оффсетов на диск (мс)
# 10000 = каждые 10 секунд
offset.flush.interval.ms=10000

# ── Плагины ───────────────────────────────────────────────────────────────────

# Путь к плагинам коннекторов.
# В bitnami/kafka FileStreamSink находится в /opt/bitnami/kafka/libs,
# а не в classpath connect-standalone.sh — добавляем явно.
plugin.path=/opt/bitnami/kafka/libs,/opt/bitnami/kafka/connectors
