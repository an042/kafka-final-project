# connect-filesink.properties — конфигурация коннектора FileStreamSink.
#
# FileStreamSink — встроенный коннектор Kafka.
# Читает сообщения из топика и записывает в файл (одна строка = одно сообщение).
#
# Результат: /data/products-filtered.jsonl — файл с разрешёнными товарами,
# прошедшими фильтрацию в Stream Processor (Шаг 4).

# ── Обязательные параметры ─────────────────────────────────────────────────────

# Имя коннектора — уникальный идентификатор в Kafka Connect
name=products-filtered-filesink

# Класс реализации — встроенный FileStreamSink (не требует плагинов)
connector.class=org.apache.kafka.connect.file.FileStreamSinkConnector

# Топик-источник — products-filtered (наполняется Stream Processor)
topics=products-filtered

# ── Выходной файл ─────────────────────────────────────────────────────────────

# Путь к файлу внутри контейнера
# /data/ монтируется как именованный том connect-data (docker-compose.yml)
file=/data/products-filtered.jsonl

# ── Параллелизм ───────────────────────────────────────────────────────────────

# tasks.max — максимальное число параллельных задач коннектора
# Для FileStreamSink в standalone режиме = 1 (один файл не поддерживает конкурентную запись)
tasks.max=1

# ── Consumer настройки ─────────────────────────────────────────────────────────

# consumer.override.auto.offset.reset — читать с самого начала при первом запуске
# earliest: все накопленные сообщения попадут в файл
# latest (default): только новые сообщения
consumer.override.auto.offset.reset=earliest

# Группа consumer-а для этого коннектора
consumer.override.group.id=connect-filesink-group
